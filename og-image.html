<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Source+Sans+3:wght@400;500&family=Noto+Sans+Bengali:wght@600;700&family=Noto+Serif+Bengali:wght@600&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                width: 1200px;
                height: 630px;
                background: #fdfaf5;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
                font-family: "Source Sans 3", sans-serif;
            }

            /* Floating chars */
            .bg-char {
                position: absolute;
                font-family: "Noto Serif Bengali", serif;
                color: #c0392b;
                opacity: 0.06;
                font-weight: 700;
            }

            .content {
                text-align: center;
                z-index: 1;
                position: relative;
            }

            .logo {
                display: inline-flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 28px;
            }
            .logo-icon {
                width: 52px;
                height: 52px;
                background: #c0392b;
                border-radius: 13px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Noto Serif Bengali", serif;
                font-weight: 700;
                font-size: 28px;
                color: #fff;
            }
            .logo-text {
                font-family: "Playfair Display", serif;
                font-size: 28px;
                font-weight: 600;
                color: #2c1810;
            }
            .logo-bangla {
                font-family: "Noto Sans Bengali", sans-serif;
                font-size: 22px;
                opacity: 0.6;
                color: #2c1810;
            }

            h1 {
                font-family: "Playfair Display", serif;
                font-size: 52px;
                line-height: 1.2;
                color: #2c1810;
                letter-spacing: -0.03em;
                margin-bottom: 16px;
            }
            h1 em {
                color: #c0392b;
                font-style: italic;
            }

            .sub {
                font-size: 22px;
                color: #7a6b5d;
                max-width: 600px;
                margin: 0 auto;
                line-height: 1.6;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                gap: 16px;
                margin-top: 28px;
                font-family: "JetBrains Mono", monospace;
                font-size: 15px;
                color: #7a6b5d;
            }
            .badge span {
                background: #f5efe5;
                padding: 6px 14px;
                border-radius: 6px;
                border: 1px solid #e8dfd0;
            }
        </style>
    </head>
    <body>
        <span class="bg-char" style="top: 8%; left: 5%; font-size: 80px"
            >অ</span
        >
        <span class="bg-char" style="top: 15%; right: 8%; font-size: 70px"
            >আ</span
        >
        <span class="bg-char" style="top: 60%; left: 3%; font-size: 90px"
            >ক</span
        >
        <span class="bg-char" style="top: 70%; right: 5%; font-size: 60px"
            >ম</span
        >
        <span class="bg-char" style="top: 10%; left: 75%; font-size: 65px"
            >ব</span
        >
        <span class="bg-char" style="top: 80%; left: 20%; font-size: 55px"
            >ল</span
        >
        <span class="bg-char" style="top: 40%; right: 3%; font-size: 85px"
            >ই</span
        >
        <span class="bg-char" style="top: 55%; left: 80%; font-size: 60px"
            >ত</span
        >
        <span class="bg-char" style="top: 25%; left: 15%; font-size: 70px"
            >র</span
        >
        <span class="bg-char" style="top: 75%; left: 65%; font-size: 75px"
            >শ</span
        >

        <div class="content">
            <div class="logo">
                <div class="logo-icon">অ</div>
                <span class="logo-text">Lekho</span>
                <span class="logo-bangla">(লেখো)</span>
            </div>
            <h1>Avro Phonetic typing is<br /><em>back on Mac.</em></h1>
            <!-- subtitle hidden for now
            <p class="sub">
                Avro Phonetic Bengali Keyboard for macOS.
            </p>
            -->
            <div class="badge">
                <span>~2.6 MB</span>
                <span>Apple Silicon</span>
                <span>150k Words</span>
                <span>Free</span>
            </div>
        </div>
    </body>
</html>
